<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Chatbot Escolar</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f2f2f2;
            padding: 20px;
        }
        #chat-box {
            max-width: 500px;
            height: 500px;
            margin: 0 auto 20px;
            padding: 15px;
            border-radius: 15px;
            background-color: #fff;
            overflow-y: auto;
        }
        .mensagem {
            padding: 10px 15px;
            border-radius: 20px;
            margin-bottom: 10px;
            word-wrap: break-word;
        }
        .usuario {
            background-color: #0d6efd;
            color: white;
            align-self: flex-end;
        }
        .bot {
            background-color: #e9ecef;
            color: black;
            align-self: flex-start;
        }
    </style>
</head>

<body>
<div class="container text-center">
    <h2 class="mb-4">Chatbot da Escola</h2>

    <div id="chat-box" class="d-flex flex-column">
        {% if mensagem_usuario or resposta %}
    {% if mensagem_usuario %}
        <div class="mensagem usuario ms-auto">{{ mensagem_usuario }}</div>
    {% endif %}
    <div class="mensagem bot me-auto">{{ resposta }}</div>
{% else %}
    <div class="mensagem bot me-auto">
        Olá! Eu sou o chatbot da escola. Como posso te ajudar?
    </div>
{% endif %}
    </div>

    <form method="post" class="d-flex justify-content-center">
        <input type="text" name="mensagem" class="form-control me-2"
               placeholder="Digite sua mensagem" required style="max-width:400px;">
        <button type="submit" class="btn btn-primary">Enviar</button>
    </form>
</div>
</body>
</html>
